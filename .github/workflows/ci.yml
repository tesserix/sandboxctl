name: ci

on:
  push:
    branches: [main]
    # Tag pushes are handled by release.yml. Be explicit so a future change
    # that broadens `branches` doesn't accidentally double-run CI on a tag.
    tags-ignore: ['**']
  pull_request:

jobs:
  bash:
    name: bash syntax + shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: bash -n
        run: |
          bash -n sandbox.sh
          bash -n install.sh
      - name: shellcheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          severity: warning
          ignore_paths: cli

  go:
    name: go build + vet + smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache-dependency-path: cli/go.sum
      - name: go vet
        working-directory: cli
        run: go vet ./...
      - name: go build
        working-directory: cli
        run: go build -trimpath -ldflags "-s -w -X main.assetDir=/tmp -X main.version=ci" -o /tmp/sandboxctl ./...
      - name: smoke (version)
        run: |
          /tmp/sandboxctl version | grep -q "sandboxctl ci"
      - name: smoke (secret rand)
        run: |
          out=$(/tmp/sandboxctl secret rand 16)
          [[ ${#out} == 32 ]] || { echo "expected 32 hex chars, got: $out" >&2; exit 1; }
      - name: smoke (secret bcrypt)
        run: |
          out=$(printf 'hunter2' | /tmp/sandboxctl secret bcrypt)
          [[ "$out" == \$2a\$10\$* ]] || { echo "expected bcrypt hash, got: $out" >&2; exit 1; }

  yaml:
    name: kubeconform manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: install kubeconform
        run: |
          curl -sSLo kubeconform.tgz \
            https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz
          tar -xzf kubeconform.tgz kubeconform
          sudo mv kubeconform /usr/local/bin/
      - name: validate static manifests
        run: |
          kubeconform -strict -summary -ignore-missing-schemas manifests/

  goreleaser-check:
    name: goreleaser check (no release)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache-dependency-path: cli/go.sum
      - name: validate config + build snapshot
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: '~> v2'
          args: build --snapshot --clean --single-target
